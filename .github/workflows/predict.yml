name: ML Price Prediction
on:
  workflow_dispatch:
    inputs:
      area:
        description: 'Площадь (м²)'
        required: true
      build_year:
        description: 'Год постройки'
        required: false
      object_type:
        description: 'Тип объекта'
        required: false
        type: choice
        options:
          - Земельный участок
          - Здание
          - Помещение
          - Сооружение
      permitted_use:
        description: 'ВРИ — для ЗУ (достаточно ключевого слова)'
        required: false
        default: ''
      wall_material:
        description: 'Материал стен — для зданий (достаточно ключевого слова)'
        required: false
        default: ''
      name:
        description: 'Наименование — для зданий (достаточно 1-2 слов)'
        required: false
        default: ''
      address:
        description: 'Адрес (город или улица)'
        required: false
        default: ''
      kadastr:
        description: 'Кадастровый номер'
        required: false
        default: ''

jobs:
  predict:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install pandas catboost scikit-learn openpyxl
      - name: Train model
        run: python train_model.py
      - name: Predict price
        run: |
          python predict.py ${{ inputs.area }} ${{ inputs.build_year }} '${{ inputs.object_type }}' '${{ inputs.permitted_use }}' '${{ inputs.address }}' '${{ inputs.kadastr }}' '${{ inputs.wall_material }}' '${{ inputs.name }}'
