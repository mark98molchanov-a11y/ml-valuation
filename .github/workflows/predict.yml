name: ML Price Prediction
on:
  workflow_dispatch:
    inputs:
      area:
        description: 'Площадь (м²)'
        required: true
      build_year:
        description: 'Год постройки'
        required: false
        default: '2015'
      object_type:
        description: 'Тип объекта'
        required: false
        default: 'Помещение'
      usage:
        description: 'Вид использования'
        required: false
        default: ''
      address:
        description: 'Адрес'
        required: false
        default: ''

jobs:
  predict:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      # Кеш для pip-зависимостей
      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            pip-${{ runner.os }}-
      
      # Кеш для модели (model.pkl)
      - name: Cache model
        uses: actions/cache@v4
        with:
          path: |
            model.pkl
            deals_clean.csv
          key: model-${{ hashFiles('deals.xlsx', 'train_model.py') }}
      
      - name: Install dependencies
        run: pip install pandas catboost scikit-learn openpyxl
      
      - name: Train model (skip if cached)
        run: |
          if [ ! -f model.pkl ]; then
            echo "Модель не найдена, обучаем..."
            python train_model.py
          else
            echo "✅ Используем кешированную модель"
          fi
      
      - name: Predict price
        run: |
          python predict.py ${{ inputs.area }} ${{ inputs.build_year }} '${{ inputs.object_type }}' '${{ inputs.usage }}' '${{ inputs.address }}'
