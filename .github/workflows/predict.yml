name: ML Price Prediction
on:
  workflow_dispatch:
    inputs:
      area:
        description: 'Площадь (м²)'
        required: true
      build_year:
        description: 'Год постройки'
        required: false
        default: '2015'
      object_type:
        description: 'Тип объекта (Земельный участок / Здание / Помещение / Сооружение)'
        required: false
        default: 'Помещение'
      permitted_use:
        description: 'ВРИ (только для земельных участков)'
        required: false
        default: ''
      address:
        description: 'Адрес'
        required: false
        default: ''
      kadastr:
        description: 'Кадастровый номер'
        required: false
        default: ''
      wall_material:
        description: 'Материал стен (Кирпич/Панель/Монолит/Дерево/Блок)'
        required: false
        default: ''
      name:
        description: 'Наименование (для зданий/помещений/сооружений)'
        required: false
        default: ''

jobs:
  predict:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install pandas catboost scikit-learn openpyxl
      - name: Train model
        run: python train_model.py
      - name: Predict price
        run: |
          python predict.py ${{ inputs.area }} ${{ inputs.build_year }} '${{ inputs.object_type }}' '${{ inputs.permitted_use }}' '${{ inputs.address }}' '${{ inputs.kadastr }}' '${{ inputs.wall_material }}' '${{ inputs.name }}'
